<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - Reading Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2>📚 Reading Tracker</h2>
            <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2>Add New Book</h2>
            <form id="addBookForm" onsubmit="handleSubmit(event)" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title">Book Title *</label>
                    <input type="text" id="title" name="title" required placeholder="Enter book title">
                </div>

                <div class="form-group">
                    <label for="author">Author *</label>
                    <input type="text" id="author" name="author" required placeholder="Enter author name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="total_pages">Total Pages *</label>
                        <input type="number" id="total_pages" name="total_pages" min="1" required>
                    </div>

                    <div class="form-group">
                        <label for="pages_read">Pages Read *</label>
                        <input type="number" id="pages_read" name="pages_read" min="0" value="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="genre">Genre</label>
                    <select id="genre" name="genre">
                        <option value="">Select genre...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="rating">Rating (1-5 stars)</label>
                    <div class="rating-input">
                        <input type="radio" name="rating" value="1" id="star1">
                        <label for="star1">⭐</label>
                        <input type="radio" name="rating" value="2" id="star2">
                        <label for="star2">⭐</label>
                        <input type="radio" name="rating" value="3" id="star3">
                        <label for="star3">⭐</label>
                        <input type="radio" name="rating" value="4" id="star4">
                        <label for="star4">⭐</label>
                        <input type="radio" name="rating" value="5" id="star5">
                        <label for="star5">⭐</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="cover_image">Book Cover Image</label>
                    <input type="file" id="cover_image" name="cover_image" accept="image/*">
                    <small>Max 2MB, JPG/PNG only</small>
                </div>

                <div class="form-group">
                    <label for="notes">Notes / Review</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Your thoughts about this book..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="start_date">Start Date</label>
                        <input type="date" id="start_date" name="start_date">
                    </div>

                    <div class="form-group">
                        <label for="finish_date">Finish Date</label>
                        <input type="date" id="finish_date" name="finish_date">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Add Book</button>
                    <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadGenres();
            initDarkMode();
        });

        function loadGenres() {
            fetch('get_genres.php')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const select = document.getElementById('genre');
                        data.genres.forEach(genre => {
                            const option = document.createElement('option');
                            option.value = genre.name;
                            option.textContent = genre.name;
                            select.appendChild(option);
                        });
                    }
                });
        }

        function handleSubmit(event) {
            event.preventDefault();
            
            const form = document.getElementById('addBookForm');
            const totalPages = parseInt(form.total_pages.value);
            const pagesRead = parseInt(form.pages_read.value);
            
            if (pagesRead > totalPages) {
                showMessage('Pages read cannot exceed total pages', 'error');
                return;
            }
            
            const formData = new FormData(form);
            
            fetch('add_book.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('Book added successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'Error adding book', 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showMessage('Error adding book', 'error');
            });
        }

        function initDarkMode() {
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
            }
        }
    </script>
</body>
</html>
