<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book - Reading Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2>📚 Reading Tracker</h2>
            <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2>Edit Book Progress</h2>
            <form id="editBookForm" onsubmit="handleUpdate(event)">
                <input type="hidden" id="book_id" name="id">

                <div class="form-group">
                    <label for="title">Book Title *</label>
                    <input type="text" id="title" name="title" required placeholder="Enter book title">
                </div>

                <div class="form-group">
                    <label for="author">Author *</label>
                    <input type="text" id="author" name="author" required placeholder="Enter author name">
                </div>

                <div class="form-group">
                    <label for="total_pages">Total Pages *</label>
                    <input type="number" id="total_pages" name="total_pages" min="1" required placeholder="Enter total pages">
                </div>

                <div class="form-group">
                    <label for="pages_read">Pages Read *</label>
                    <input type="number" id="pages_read" name="pages_read" min="0" required placeholder="Enter pages read">
                </div>

                <div class="progress-preview">
                    <p>Progress: <span id="progressPercent">0%</span></p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Book</button>
                    <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Get book ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('id');

        if (!bookId) {
            showMessage('No book ID provided', 'error');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        } else {
            loadBookDetails(bookId);
        }

        // Load book details
        function loadBookDetails(id) {
            fetch(`book_details.php?id=${id}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.book) {
                        const book = data.book;
                        document.getElementById('book_id').value = book.id;
                        document.getElementById('title').value = book.title;
                        document.getElementById('author').value = book.author;
                        document.getElementById('total_pages').value = book.total_pages;
                        document.getElementById('pages_read').value = book.pages_read;
                        updateProgressPreview();
                    } else {
                        showMessage('Book not found', 'error');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 2000);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('Error loading book details', 'error');
                });
        }

        // Update progress preview when pages change
        document.getElementById('pages_read').addEventListener('input', updateProgressPreview);
        document.getElementById('total_pages').addEventListener('input', updateProgressPreview);

        function updateProgressPreview() {
            const totalPages = parseInt(document.getElementById('total_pages').value) || 1;
            const pagesRead = parseInt(document.getElementById('pages_read').value) || 0;
            const progress = Math.min((pagesRead / totalPages * 100), 100).toFixed(1);
            
            document.getElementById('progressPercent').textContent = progress + '%';
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // Handle form submission
        function handleUpdate(event) {
            event.preventDefault();

            const form = document.getElementById('editBookForm');
            const totalPages = parseInt(form.total_pages.value);
            const pagesRead = parseInt(form.pages_read.value);

            // Validation
            if (pagesRead < 0) {
                showMessage('Pages read cannot be negative', 'error');
                return;
            }

            if (pagesRead > totalPages) {
                showMessage('Pages read cannot exceed total pages', 'error');
                return;
            }

            // Create FormData object
            const formData = new FormData(form);

            // Send to server
            fetch('update_book.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('Book updated successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'Error updating book', 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showMessage('Error updating book. Please try again.', 'error');
            });
        }
    </script>
</body>
</html>
